baseURL: https://golfed.xyz/
title: Arttu Einistö

paginate: 5
# rssLimit: 20
languageCode: en-GB
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

theme: PaperMod

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Arttu Einistö
  description: Personal blog and portfolio of Arttu Einistö
  keywords: [Blog, Portfolio]
  author: Arttu Einistö
  images: []
  DateFormat: January 2, 2006
  defaultTheme: dark
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShareButtons: ["twitter", "linkedin", "reddit", "telegram", "whatsapp"]
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    disableFingerprinting: true
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"
    manifest: "/site.webmanifest"
    theme_color: "#55b5e4"
    msapplication_TileColor: "#2d89ef"

  label:
    text: "golfed.xyz"
    icon: /favicon.ico
    iconHeight: 24

  # home-info mode
  homeInfoParams:
    Title: "Arttu Einistö"
    Content: ""

  socialIcons:
    - name: email
      url: "mailto:contact@golfed.xyz"
    - name: cv
      url: "https://golfed.xyz/cv.pdf"
    - name: github
      url: "https://github.com/17ms"
    - name: linkedin
      url: "https://linkedin.com/in/einisto/"
    - name: monero
      url: "/xmr.txt"
    - name: pgp
      url: "/pgp.asc"

  #analytics:
  #  google:
  #    SiteVerificationTag: "XYZabc"
  #  bing:
  #    SiteVerificationTag: "XYZabc"
  #  yandex:
  #    SiteVerificationTag: "XYZabc"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/17ms/golfed.xyz/blob/master/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: about
      name: about
      url: /about/
      weight: 10
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
