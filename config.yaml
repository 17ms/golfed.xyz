baseURL: "https://golfed.xyz"
copyright: "MIT"
defaultContentLanguage: "en"
enableRobotsTXT: true
enableEmoji: true

theme: "hugo-bearcub"

author:
  name: "Arttu Einistö"

# https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/style-src#unsafe_inline_styles
markup:
  highlight:
    lineNos: true
    lineNumbersInTable: false
    # https://web.dev/color-and-contrast-accessibility/
    noClasses: false

# https://gohugo.io/content-management/multilingual/
languages:
  en:
    title: "Golfed"
    languageName: "en-US"
    LanguageCode: "en-US"
    contentDir: "content"
    params:
      madeWith:
        "Made with [Hugo](https://gohugo.io/) & [Bear
        Cub](https://github.com/clente/hugo-bearcub)"

params:
  description: "Personal website of Arttu Einistö"
  favicon: "images/favicon.ico"

  # Images for link previews (ignored if `generateSocialCard: true`)
  # https://gohugo.io/templates/internal#twitter-cards
  # https://gohugo.io/templates/internal#open-graph
  images: []

  # https://gohugo.io/templates/internal#open-graph
  title: "Golfed"

  dateFormat: "2006-01-02"
  hideUntranslated: false

  # (EXPERIMENTAL) This theme is capable of dynamically generating social cards
  # for posts that don't have `images` defined in their front matter; By setting
  # `generateSocialCard` to false, you can prevent this behavior. For more
  # information see layouts/partials/seo_tags.html
  generateSocialCard: true

  # Links attached to the page head
  social:
    email: "hello@golfed.xyz"

  # Icons to be displayed in the page header ('display' defaults to capitalized version of 'name')
  socialIcons:
    - name: email
      url: "mailto:hello@golfed.xyz"
    - name: xmpp
      url: "xmpp:einisto@xmpp.is"
      display: XMPP
    - name: github
      url: "https://github.com/17ms"
    - name: linkedin
      url: "https://linkedin.com/in/einisto/"
    - name: pgpkey
      url: "https://keys.openpgp.org/vks/v1/by-fingerprint/88C6E670979E4D96F86DA66DFCD0246B94FEC36D"
      display: PGP
    - name: monero
      url: "/xmr.txt"
