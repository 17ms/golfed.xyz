<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    <title>{{ block "title" . }} {{ .Site.Title }} {{ end }}</title>
    {{ partialCached "head.html" . }}
  </head>

  <body>
    <div class="flexWrapper">
      {{ partialCached "header.html" . }}
      <div class="content">
        <main class="main">{{ block "main" . }} {{ end }}</main>
      </div>
      {{ partialCached "footer.html" . }}
    </div>
  </body>
</html>
