<div class="socialNavbar">
  <ul>
    {{ range sort .Site.Params.social "key"}}
    <li>
      {{ if isset . "icon" }}
      <a
        href="{{ .url | safeURL }}"
        aria-hidden="true"
        title="{{ .name }}"
        target="_blank"
      >
        <i class="{{ .icon }}"></i>
      </a>
      {{ else }}
      <a href="{{ .url | safeURL }}" target="_blank">{{ .name }}</a>
      {{ end }}
    </li>
    {{ end }}
  </ul>
</div>
